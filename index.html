<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>渋谷ぶつかりおじさん回避</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --neon-pink:#ff2d78;
    --neon-cyan:#00f0ff;
    --neon-yellow:#ffd400;
    --night:#070a14;
    --sand:#c79a55;
    --arena-red:#8d1f1f;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--night);
    font-family:'Noto Sans JP','Hiragino Sans',sans-serif;color:#fff;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{display:block;touch-action:none;}

  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:24px;
    background:radial-gradient(circle at 50% 30%,rgba(20,8,30,.55),rgba(5,6,15,.92));
    backdrop-filter:blur(2px);}
  .hidden{display:none!important;}

  .title{font-family:'Dela Gothic One',sans-serif;line-height:1.15;
    font-size:clamp(28px,8vw,58px);letter-spacing:.02em;}
  .title .pink{color:var(--neon-pink);text-shadow:0 0 18px rgba(255,45,120,.7);}
  .title .cyan{color:var(--neon-cyan);text-shadow:0 0 18px rgba(0,240,255,.7);}
  .sub{margin-top:14px;font-weight:700;font-size:clamp(13px,3.6vw,17px);
    color:#cfd6e6;max-width:30ch;line-height:1.7;}
  .rules{margin-top:18px;font-size:clamp(12px,3.2vw,15px);color:#aab2c5;
    line-height:1.8;max-width:30em;text-align:left;}
  .rules .rule{padding-left:1.25em;text-indent:-1.25em;margin-bottom:5px;}
  .rules b{color:var(--neon-yellow);font-weight:900;}

  .btn{margin-top:26px;font-family:'Dela Gothic One',sans-serif;
    font-size:clamp(18px,5vw,24px);padding:16px 40px;border:none;border-radius:999px;
    color:#0a0a12;background:linear-gradient(135deg,var(--neon-cyan),#7affd9);
    box-shadow:0 0 30px rgba(0,240,255,.45);cursor:pointer;transition:transform .12s;}
  .btn:active{transform:scale(.94);}
  .btn.again{background:linear-gradient(135deg,var(--neon-pink),#ff8fb4);
    box-shadow:0 0 30px rgba(255,45,120,.45);}

  .go-score{font-family:'Dela Gothic One',sans-serif;font-size:clamp(40px,13vw,86px);
    color:var(--neon-yellow);text-shadow:0 0 24px rgba(255,212,0,.6);line-height:1;}
  .go-label{margin-top:6px;font-weight:700;letter-spacing:.3em;color:#cfd6e6;font-size:13px;}
  .go-best{margin-top:14px;font-weight:700;color:#8c93a6;font-size:14px;}

  #mute{position:absolute;top:14px;right:14px;z-index:5;width:42px;height:42px;
    border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(10,14,26,.6);
    color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .credit{position:absolute;bottom:16px;font-size:11px;color:#586079;letter-spacing:.08em;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <button id="mute" aria-label="サウンド切替">♪</button>

  <div id="titleScreen" class="overlay">
    <div class="title"><span class="pink">渋谷</span> ぶつかり<br><span class="cyan">おじさん</span> 回避</div>
    <div class="sub">スクランブル交差点（概念）でぶつかりおじさん（BTOJSN）をよけて進め</div>
    <div class="rules">
      <div class="rule">・指／マウスで移動（矢印キーも可）</div>
      <div class="rule">・<b>BTOJSN</b>にぶつかられたら<b>ハートが減少</b></div>
      <div class="rule">・<b>BTOJSN同士</b>をぶつけるとボーナスポイント</div>
      <div class="rule">・<b>ゲージ</b>が満タンで <b>闘牛場</b>を召喚できる</div>
      <div class="rule">・闘牛はBTOJSNだけを蹴散らす</div>
      <div class="rule">・<b>闘牛タイムは無敵</b>（プレイヤーのハートは減らない）</div>
    </div>
    <button id="startBtn" class="btn">はじめる</button>
    <div class="credit">SHIBUYA SCRAMBLE / 闘牛場 MODE</div>
  </div>

  <div id="overScreen" class="overlay hidden">
    <div class="go-label">GAME OVER</div>
    <div id="finalScore" class="go-score">0</div>
    <div class="go-label">SCORE</div>
    <div id="bestScore" class="go-best">ベスト 0</div>
    <button id="againBtn" class="btn again">もう一度</button>
  </div>
</div>

<script>
(()=>{
"use strict";

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const titleScreen=document.getElementById("titleScreen");
const overScreen=document.getElementById("overScreen");
const startBtn=document.getElementById("startBtn");
const againBtn=document.getElementById("againBtn");
const finalScoreEl=document.getElementById("finalScore");
const bestScoreEl=document.getElementById("bestScore");
const muteBtn=document.getElementById("mute");

let W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth; H=window.innerHeight;
  canvas.width=W*DPR; canvas.height=H*DPR;
  canvas.style.width=W+"px"; canvas.style.height=H+"px";
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener("resize",resize);
resize();

/* ---------- audio (synth) ---------- */
let AC=null, muted=false;
function ac(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return AC; }
function beep(freq,dur,type,vol){
  if(muted) return; const a=ac(); if(!a) return;
  const o=a.createOscillator(),g=a.createGain();
  o.type=type||"square"; o.frequency.value=freq;
  g.gain.value=0; o.connect(g); g.connect(a.destination);
  const t=a.currentTime;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol||0.12,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t); o.stop(t+dur);
}
function boom(){
  if(muted) return; const a=ac(); if(!a) return;
  const t=a.currentTime;
  const buf=a.createBuffer(1,a.sampleRate*0.3,a.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++){ d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2); }
  const src=a.createBufferSource(); src.buffer=buf;
  const g=a.createGain(); g.gain.value=0.25;
  const f=a.createBiquadFilter(); f.type="lowpass"; f.frequency.value=900;
  src.connect(f); f.connect(g); g.connect(a.destination);
  src.start(t);
  beep(110,0.18,"sawtooth",0.18);
}
muteBtn.addEventListener("click",()=>{ muted=!muted; muteBtn.textContent=muted?"✕":"♪"; muteBtn.style.opacity=muted?.5:1; });

/* ---------- state ---------- */
const S={ TITLE:0, PLAY:1, BULL:2, OVER:3 };
let state=S.TITLE;
let score=0, best=0;
try{ best=parseInt(localStorage.getItem("shibuya_best")||"0",10)||0; }catch(e){ best=0; }

let player, ojisans=[], bulls=[], particles=[], floaters=[];
let hearts, meter, meterMax;
let spawnTimer, spawnGap, elapsed, shake, bullTimer, bullSpawnTimer, flash, epigraphT;
let input={x:0,y:0,active:false}, keys={};

function reset(){
  player={x:W/2,y:H*0.62,r:15,invuln:1.2};
  ojisans=[]; bulls=[]; particles=[]; floaters=[];
  hearts=3; meter=0; meterMax=100;
  score=0; elapsed=0;
  spawnTimer=0; spawnGap=1.1;
  shake=0; bullTimer=0; bullSpawnTimer=0; flash=0; epigraphT=0;
  input.x=player.x; input.y=player.y;
}

/* ---------- input ---------- */
function pointer(e){
  const t=e.touches?e.touches[0]:e;
  input.x=t.clientX; input.y=t.clientY;
}
canvas.addEventListener("pointerdown",e=>{ input.active=true; pointer(e); ac(); });
canvas.addEventListener("pointermove",e=>{ if(input.active||e.pointerType==="mouse") pointer(e); });
window.addEventListener("pointerup",()=>{ input.active=false; });
window.addEventListener("keydown",e=>{ keys[e.key.toLowerCase()]=true; });
window.addEventListener("keyup",e=>{ keys[e.key.toLowerCase()]=false; });

/* ---------- spawning ---------- */
function spawnOjisan(){
  const side=Math.floor(Math.random()*4);
  let x,y;
  if(side===0){x=Math.random()*W;y=-30;}
  else if(side===1){x=W+30;y=Math.random()*H;}
  else if(side===2){x=Math.random()*W;y=H+30;}
  else{x=-30;y=Math.random()*H;}
  const speed=46+Math.min(elapsed*0.9,55)+Math.random()*16;
  const a=Math.atan2(player.y-y,player.x-x);
  ojisans.push({x,y,vx:Math.cos(a)*speed,vy:Math.sin(a)*speed,
    r:17,speed,angle:a,turn:1.6+Math.random()*0.7,
    wob:Math.random()*6.28,tone:Math.random()<.5?"#e3b894":"#d9a878"});
}
function spawnBull(dir){
  const fromLeft=dir>0;
  bulls.push({
    x:fromLeft?-80:W+80,
    y:60+Math.random()*(H-160),
    vx:(fromLeft?1:-1)*(360+Math.random()*120),
    r:32, dir:fromLeft?1:-1, kick:0
  });
}

/* ---------- effects ---------- */
function explode(x,y,n,colors,spread){
  for(let i=0;i<n;i++){
    const a=Math.random()*6.28, sp=spread*(0.3+Math.random());
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:0.5+Math.random()*0.5,max:1,
      r:2+Math.random()*4,c:colors[(Math.random()*colors.length)|0]});
  }
}
function floatText(x,y,txt,c){ floaters.push({x,y,txt,c,life:1}); }

/* ---------- bull mode ---------- */
function triggerBull(){
  state=S.BULL; bullTimer=7; bullSpawnTimer=0; flash=0.5; epigraphT=4;
  floatText(W/2,H*0.4,"闘牛場！","#ffd400");
  beep(330,0.12,"square",0.15);
  setTimeout(()=>beep(440,0.12,"square",0.15),120);
  setTimeout(()=>beep(587,0.18,"square",0.15),240);
}

/* ---------- update ---------- */
function update(dt){
  elapsed+=dt;
  flash=Math.max(0,flash-dt*1.5);
  shake=Math.max(0,shake-dt*40);

  // player movement
  let tx=input.x, ty=input.y;
  let kx=0,ky=0;
  if(keys["arrowleft"]||keys["a"])kx-=1;
  if(keys["arrowright"]||keys["d"])kx+=1;
  if(keys["arrowup"]||keys["w"])ky-=1;
  if(keys["arrowdown"]||keys["s"])ky+=1;
  if(kx||ky){
    const m=Math.hypot(kx,ky)||1;
    input.x+=kx/m*360*dt; input.y+=ky/m*360*dt;
    input.x=Math.max(0,Math.min(W,input.x));
    input.y=Math.max(0,Math.min(H,input.y));
    tx=input.x; ty=input.y;
  }
  player.x+=(tx-player.x)*Math.min(1,dt*12);
  player.y+=(ty-player.y)*Math.min(1,dt*12);
  player.x=Math.max(player.r,Math.min(W-player.r,player.x));
  player.y=Math.max(player.r,Math.min(H-player.r,player.y));
  if(player.invuln>0) player.invuln-=dt;

  // spawn ojisan
  const playing=(state===S.PLAY||state===S.BULL);
  if(playing){
    spawnTimer-=dt;
    spawnGap=Math.max(0.42,1.1-elapsed*0.012);
    if(spawnTimer<=0 && ojisans.length<34){
      spawnOjisan(); spawnTimer=spawnGap*(state===S.BULL?0.6:1);
    }
  }

  // ojisan steering
  for(const o of ojisans){
    o.wob+=dt*4;
    const desired=Math.atan2(player.y-o.y,player.x-o.x);
    let diff=desired-o.angle;
    while(diff>Math.PI)diff-=6.283; while(diff<-Math.PI)diff+=6.283;
    o.angle+=Math.max(-o.turn*dt,Math.min(o.turn*dt,diff));
    const sp=o.speed*(state===S.BULL?0.65:1);
    o.vx=Math.cos(o.angle)*sp; o.vy=Math.sin(o.angle)*sp;
    o.x+=o.vx*dt; o.y+=o.vy*dt;
  }

  // ojisan-ojisan collisions
  for(let i=0;i<ojisans.length;i++){
    for(let j=i+1;j<ojisans.length;j++){
      const a=ojisans[i],b=ojisans[j];
      const dx=a.x-b.x,dy=a.y-b.y,d=Math.hypot(dx,dy);
      if(d<a.r+b.r){
        const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
        explode(mx,my,26,["#ff2d78","#ffd400","#ff7b3a","#ffffff"],240);
        boom(); shake=12; flash=Math.max(flash,0.35);
        score+=50; floatText(mx,my,"+50","#ffd400");
        meter=Math.min(meterMax,meter+14);
        ojisans.splice(j,1); ojisans.splice(i,1);
        i--; break;
      }
    }
  }

  // player hit
  if(player.invuln<=0 && state!==S.BULL){
    for(let i=0;i<ojisans.length;i++){
      const o=ojisans[i];
      if(Math.hypot(player.x-o.x,player.y-o.y)<player.r+o.r-4){
        hearts--; player.invuln=1.6; shake=16; flash=0.5;
        explode(player.x,player.y,18,["#00f0ff","#ffffff"],180);
        beep(140,0.3,"sawtooth",0.2);
        // knockback nearby ojisan
        for(const oo of ojisans){
          const a=Math.atan2(oo.y-player.y,oo.x-player.x);
          oo.x+=Math.cos(a)*70; oo.y+=Math.sin(a)*70;
        }
        if(hearts<=0){ gameOver(); return; }
        break;
      }
    }
  }

  // score over time
  if(state===S.PLAY){ score+=dt*6; }

  // meter -> bull
  if(state===S.PLAY && meter>=meterMax){ meter=0; triggerBull(); }

  // bull mode
  if(state===S.BULL){
    bullTimer-=dt;
    if(epigraphT>0) epigraphT-=dt;
    bullSpawnTimer-=dt;
    if(bullSpawnTimer<=0){ spawnBull(Math.random()<.5?1:-1); bullSpawnTimer=0.55; }
    for(let i=bulls.length-1;i>=0;i--){
      const bl=bulls[i];
      bl.x+=bl.vx*dt;
      bl.kick=Math.max(0,bl.kick-dt*5);
      // bull tramples ojisan
      for(let j=ojisans.length-1;j>=0;j--){
        const o=ojisans[j];
        if(Math.hypot(bl.x-o.x,bl.y-o.y)<bl.r+o.r){
          explode(o.x,o.y,22,["#8d1f1f","#ffae00","#ffffff","#5a2a12"],260);
          score+=80; floatText(o.x,o.y,"+80","#ffae00");
          ojisans.splice(j,1); bl.kick=1; shake=8; boom();
        }
      }
      if(bl.x< -120 || bl.x>W+120) bulls.splice(i,1);
    }
    if(bullTimer<=0){ bulls=[]; state=S.PLAY; player.invuln=1; }
  }

  // remove far-stray ojisan
  for(let i=ojisans.length-1;i>=0;i--){
    const o=ojisans[i];
    if(o.x<-120||o.x>W+120||o.y<-120||o.y>H+120) ojisans.splice(i,1);
  }

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.93; p.vy*=0.93;
    p.life-=dt; if(p.life<=0) particles.splice(i,1);
  }
  for(let i=floaters.length-1;i>=0;i--){
    const f=floaters[i]; f.y-=dt*36; f.life-=dt*1.2;
    if(f.life<=0) floaters.splice(i,1);
  }
}

function gameOver(){
  state=S.OVER;
  best=Math.max(best,Math.floor(score));
  try{ localStorage.setItem("shibuya_best",String(best)); }catch(e){}
  finalScoreEl.textContent=Math.floor(score).toLocaleString();
  bestScoreEl.textContent="ベスト "+best.toLocaleString();
  overScreen.classList.remove("hidden");
}

/* ---------- draw ---------- */
function drawBackground(){
  if(state===S.BULL){
    // arena
    ctx.fillStyle="#7a5a2e"; ctx.fillRect(0,0,W,H);
    const g=ctx.createRadialGradient(W/2,H/2,40,W/2,H/2,Math.max(W,H)*0.7);
    g.addColorStop(0,"#caa05a"); g.addColorStop(1,"#6e4d24");
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    // arena ring
    ctx.strokeStyle="rgba(141,31,31,.5)"; ctx.lineWidth=10;
    ctx.beginPath(); ctx.ellipse(W/2,H/2,W*0.42,H*0.42,0,0,6.283); ctx.stroke();
    ctx.strokeStyle="rgba(255,255,255,.12)"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(W/2,H/2,W*0.30,H*0.30,0,0,6.283); ctx.stroke();
  }else{
    ctx.fillStyle="#070a14"; ctx.fillRect(0,0,W,H);
    // scramble crossing stripes (diagonal)
    ctx.save();
    ctx.translate(W/2,H/2); ctx.rotate(-0.5); ctx.translate(-W/2,-H/2);
    ctx.fillStyle="rgba(255,255,255,0.05)";
    const sw=W*1.6;
    for(let x=-sw;x<sw;x+=46){ ctx.fillRect(x,-H,24,H*3); }
    ctx.restore();
    // neon glow blobs (city lights)
    const lights=[["#ff2d78",0.18,W*0.2,H*0.18],["#00f0ff",0.15,W*0.82,H*0.25],
      ["#ffd400",0.10,W*0.5,H*0.85]];
    for(const[c,al,lx,ly] of lights){
      const g=ctx.createRadialGradient(lx,ly,0,lx,ly,Math.max(W,H)*0.4);
      g.addColorStop(0,c); g.addColorStop(1,"transparent");
      ctx.globalAlpha=al; ctx.fillStyle=g; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1;
    }
  }
}

function drawOjisan(o){
  ctx.save();
  ctx.translate(o.x,o.y);
  const lean=Math.sin(o.wob)*0.08;
  ctx.rotate(lean);
  // shadow
  ctx.fillStyle="rgba(0,0,0,.3)";
  ctx.beginPath(); ctx.ellipse(0,o.r+4,o.r*0.8,5,0,0,6.283); ctx.fill();
  ctx.lineJoin="round"; ctx.lineCap="round";
  const edge="rgba(202,211,226,0.9)";   // light rim: separates from dark ground
  // arms forward (bumping pose)
  ctx.strokeStyle=edge; ctx.lineWidth=2;
  ctx.fillStyle="#2b323f";
  roundRect(-o.r*0.95,o.r*0.0,o.r*0.5,o.r*0.9,4); ctx.fill(); ctx.stroke();
  roundRect(o.r*0.45,o.r*0.0,o.r*0.5,o.r*0.9,4); ctx.fill(); ctx.stroke();
  // suit body
  ctx.fillStyle="#3b4252";
  roundRect(-o.r*0.7,-o.r*0.2,o.r*1.4,o.r*1.5,5); ctx.fill(); ctx.stroke();
  // tie
  ctx.fillStyle="#d23b2b";
  ctx.beginPath(); ctx.moveTo(0,-o.r*0.1); ctx.lineTo(-3,o.r*0.5);
  ctx.lineTo(0,o.r*0.9); ctx.lineTo(3,o.r*0.5); ctx.closePath(); ctx.fill();
  // head
  ctx.fillStyle=o.tone;
  ctx.beginPath(); ctx.arc(0,-o.r*0.55,o.r*0.62,0,6.283); ctx.fill();
  ctx.strokeStyle="rgba(120,88,58,0.55)"; ctx.lineWidth=1.5; ctx.stroke();
  // bald + side hair
  ctx.fillStyle="#5b5550";
  ctx.beginPath(); ctx.arc(-o.r*0.45,-o.r*0.55,o.r*0.16,0,6.283); ctx.fill();
  ctx.beginPath(); ctx.arc(o.r*0.45,-o.r*0.55,o.r*0.16,0,6.283); ctx.fill();
  // angry brows
  ctx.strokeStyle="#3a3530"; ctx.lineWidth=2; ctx.lineCap="round";
  ctx.beginPath(); ctx.moveTo(-o.r*0.3,-o.r*0.66); ctx.lineTo(-o.r*0.08,-o.r*0.56);
  ctx.moveTo(o.r*0.3,-o.r*0.66); ctx.lineTo(o.r*0.08,-o.r*0.56); ctx.stroke();
  ctx.restore();
}

function drawPlayer(){
  ctx.save();
  ctx.translate(player.x,player.y);
  const blink=player.invuln>0 && Math.floor(player.invuln*12)%2===0;
  ctx.globalAlpha=blink?0.4:1;
  // glow
  const g=ctx.createRadialGradient(0,0,2,0,0,player.r*2.4);
  g.addColorStop(0,"rgba(0,240,255,.55)"); g.addColorStop(1,"transparent");
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,player.r*2.4,0,6.283); ctx.fill();
  // shadow
  ctx.fillStyle="rgba(0,0,0,.3)";
  ctx.beginPath(); ctx.ellipse(0,player.r+4,player.r*0.7,4,0,0,6.283); ctx.fill();
  // body
  ctx.fillStyle="#00f0ff";
  roundRect(-player.r*0.6,-player.r*0.1,player.r*1.2,player.r*1.4,5); ctx.fill();
  // head
  ctx.fillStyle="#ffe0c2";
  ctx.beginPath(); ctx.arc(0,-player.r*0.55,player.r*0.55,0,6.283); ctx.fill();
  // hair
  ctx.fillStyle="#1a1a2e";
  ctx.beginPath(); ctx.arc(0,-player.r*0.72,player.r*0.55,Math.PI,0); ctx.fill();
  ctx.restore();
}

function drawBull(bl){
  ctx.save();
  ctx.translate(bl.x,bl.y);
  ctx.scale(bl.dir,1);
  const bob=Math.sin(Date.now()/60)*2;
  // shadow
  ctx.fillStyle="rgba(0,0,0,.35)";
  ctx.beginPath(); ctx.ellipse(0,bl.r+6,bl.r,7,0,0,6.283); ctx.fill();
  // body
  ctx.fillStyle="#1c140f";
  roundRect(-bl.r*1.1,-bl.r*0.7+bob,bl.r*2.2,bl.r*1.3,14); ctx.fill();
  // head
  ctx.fillStyle="#241813";
  ctx.beginPath(); ctx.arc(bl.r*0.95,-bl.r*0.2+bob,bl.r*0.7,0,6.283); ctx.fill();
  // horns
  ctx.strokeStyle="#e8dcc0"; ctx.lineWidth=6; ctx.lineCap="round";
  ctx.beginPath();
  ctx.moveTo(bl.r*1.2,-bl.r*0.5+bob); ctx.quadraticCurveTo(bl.r*1.9,-bl.r*0.9,bl.r*1.8,-bl.r*0.2);
  ctx.moveTo(bl.r*1.5,-bl.r*0.35+bob); ctx.quadraticCurveTo(bl.r*2.1,-bl.r*0.5,bl.r*2.1,bl.r*0.1);
  ctx.stroke();
  // eye
  ctx.fillStyle=bl.kick>0?"#ffae00":"#ff3b3b";
  ctx.beginPath(); ctx.arc(bl.r*1.05,-bl.r*0.3+bob,3.5,0,6.283); ctx.fill();
  // legs
  ctx.strokeStyle="#1c140f"; ctx.lineWidth=7;
  ctx.beginPath();
  ctx.moveTo(-bl.r*0.6,bl.r*0.5); ctx.lineTo(-bl.r*0.6,bl.r*1.1);
  ctx.moveTo(bl.r*0.5,bl.r*0.5); ctx.lineTo(bl.r*0.5,bl.r*1.1);
  ctx.stroke();
  // dust
  ctx.fillStyle="rgba(220,190,140,.5)";
  for(let i=0;i<3;i++){
    ctx.beginPath();
    ctx.arc(-bl.r*1.2-i*10,bl.r*0.9,5-i,0,6.283); ctx.fill();
  }
  ctx.restore();
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawHUD(){
  ctx.save();
  ctx.shadowColor="rgba(0,0,0,0.6)"; ctx.shadowBlur=6; ctx.shadowOffsetY=1;
  // score
  ctx.font="900 26px 'Dela Gothic One','Noto Sans JP',sans-serif";
  ctx.fillStyle="#fff"; ctx.textAlign="left"; ctx.textBaseline="top";
  ctx.fillText(Math.floor(score).toLocaleString(),18,16);
  ctx.font="700 12px 'Noto Sans JP',sans-serif";
  ctx.fillStyle="#8c93a6"; ctx.fillText("SCORE",18,46);

  // hearts
  ctx.textAlign="left";
  for(let i=0;i<3;i++){
    ctx.font="20px sans-serif";
    ctx.globalAlpha=i<hearts?1:0.22;
    ctx.fillText("❤️",18+i*26,66);
  }
  ctx.globalAlpha=1;

  // meter / bull timer
  const bx=18, by=H-30, bw=W-36, bh=12;
  ctx.fillStyle="rgba(255,255,255,.12)";
  roundRect(bx,by,bw,bh,6); ctx.fill();
  if(state===S.BULL){
    const p=Math.max(0,bullTimer/7);
    ctx.fillStyle="#8d1f1f"; roundRect(bx,by,bw*p,bh,6); ctx.fill();
    ctx.font="900 12px 'Dela Gothic One',sans-serif"; ctx.fillStyle="#ffd400";
    ctx.textAlign="center"; ctx.fillText("闘牛タイム",W/2,by-18);
  }else{
    const p=meter/meterMax;
    const grad=ctx.createLinearGradient(bx,0,bx+bw,0);
    grad.addColorStop(0,"#ff2d78"); grad.addColorStop(1,"#ffd400");
    ctx.fillStyle=grad; roundRect(bx,by,bw*p,bh,6); ctx.fill();
    ctx.font="700 10px 'Noto Sans JP',sans-serif"; ctx.fillStyle="#aab2c5";
    ctx.textAlign="center"; ctx.fillText("闘牛ゲージ",W/2,by-14);
  }
  ctx.textAlign="left";
  ctx.restore();
}

function draw(){
  ctx.save();
  if(shake>0){ ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake); }
  drawBackground();

  for(const o of ojisans) drawOjisan(o);
  for(const bl of bulls) drawBull(bl);
  if(state===S.PLAY||state===S.BULL) drawPlayer();

  // particles
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.c;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.283); ctx.fill();
  }
  ctx.globalAlpha=1;
  // floaters
  ctx.textAlign="center";
  for(const f of floaters){
    ctx.globalAlpha=Math.max(0,f.life);
    ctx.font="900 22px 'Dela Gothic One',sans-serif";
    ctx.fillStyle=f.c; ctx.fillText(f.txt,f.x,f.y);
  }
  ctx.globalAlpha=1; ctx.textAlign="left";
  ctx.restore();

  // flash
  if(flash>0){ ctx.fillStyle="rgba(255,255,255,"+flash*0.5+")"; ctx.fillRect(0,0,W,H); }

  if(state===S.PLAY||state===S.BULL) drawHUD();

  if(state===S.BULL && epigraphT>0) drawEpigraph();
}

function drawEpigraph(){
  // fade in/out over the timer's life
  let a=1;
  if(epigraphT>3.4) a=(4-epigraphT)/0.6;      // fade in
  else if(epigraphT<0.8) a=epigraphT/0.8;     // fade out
  a=Math.max(0,Math.min(1,a));
  ctx.save();
  ctx.globalAlpha=a;
  const cy=H*0.30;
  // backing card
  ctx.fillStyle="rgba(10,7,5,.62)";
  roundRect(W*0.5-Math.min(W*0.44,280),cy-58,Math.min(W*0.88,560),116,12); ctx.fill();
  ctx.strokeStyle="rgba(255,212,0,.35)"; ctx.lineWidth=1.5; ctx.stroke();
  ctx.textAlign="center";
  // French line (Leiris)
  ctx.fillStyle="#ffe9b0";
  ctx.font="italic 600 clamp(15px,4vw,21px) 'Noto Sans JP',serif";
  ctx.fillText("Donc, je rêvais corne de taureau.",W/2,cy-22);
  // my translation
  ctx.fillStyle="#ffffff";
  ctx.font="700 clamp(14px,4.4vw,19px) 'Noto Sans JP',sans-serif";
  ctx.fillText("かくして私は牛の角を夢みていた",W/2,cy+6);
  // attribution
  ctx.fillStyle="#9aa0b0";
  ctx.font="500 clamp(9px,2.6vw,11px) 'Noto Sans JP',sans-serif";
  ctx.fillText("— M.レリス「闘牛として見られた文学について」（私訳）",W/2,cy+34);
  ctx.restore();
  ctx.textAlign="left";
}

/* ---------- loop ---------- */
let last=performance.now();
function loop(now){
  let dt=(now-last)/1000; last=now;
  if(dt>0.05) dt=0.05;
  if(state===S.PLAY||state===S.BULL) update(dt);
  else { // idle particle decay on menus so transitions look clean
    for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.life-=dt;if(p.life<=0)particles.splice(i,1);}
  }
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ---------- flow ---------- */
function startGame(){
  ac(); reset(); state=S.PLAY;
  titleScreen.classList.add("hidden");
  overScreen.classList.add("hidden");
}
startBtn.addEventListener("click",startGame);
againBtn.addEventListener("click",startGame);

})();
</script>
